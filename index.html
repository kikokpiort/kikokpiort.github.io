<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>无限彩票站</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
  height: 100vh;
}

/* 顶部滚动条 */
.marquee {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #000;
  color: red;
  font-size: 16px;
  padding: 4px 0;
  z-index: 999;
  overflow: hidden;
  white-space: nowrap;
}
.marquee-inner {
  display: inline-block;
  animation: marquee 12s linear infinite;
}
@keyframes marquee {
  0%   { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}
.content {
  position: relative;
  z-index: 2;
  padding: 60px 20px 40px;
}
.title {
  font-size: 26px;
  margin-bottom: 30px;
  color: #ffd700;
}
button {
  display: block;
  width: 80%;
  margin: 12px auto;
  padding: 16px;
  font-size: 18px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(90deg, #ff416c, #ff4b2b);
  color: white;
  font-weight: bold;
  touch-action: manipulation;
}
button:disabled {
  background: #555;
}
#tip {
  margin: 20px 0;
  font-size: 18px;
  color: #fff;
}
#resultName {
  font-size: 22px;
  color: #ffd700;
  margin: 10px 0;
}
#ballArea {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin: 20px 0;
  min-height: 60px;
}
.ball {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 18px;
  background: #222;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.ball.red { background: #e00; }
.ball.blue { background: #06f; }
.roll::after {
  content: '88888888';
  position: absolute;
  animation: roll 0.12s infinite linear;
}
@keyframes roll {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100%); }
}
#copy {
  padding: 10px 20px;
  background: #09f;
  color: white;
  border: none;
  border-radius: 30px;
  display: none;
  touch-action: manipulation;
}
</style>
</head>
<body>

<!-- 顶部两条文字滚动 -->
<div class="marquee">
  <div class="marquee-inner" id="marqueeText"></div>
</div>

<canvas id="stars"></canvas>

<div class="content">
  <div class="title">尚壁无限中奖彩票站</div>
  <button id="btn1">双色球</button>
  <button id="btn2">大乐透</button>
  <button id="btn3">福彩3D</button>
  <div id="tip"></div>
  <div id="resultName"></div>
  <div id="ballArea"></div>
  <button id="copy">复制号码</button>
</div>

<script>
const cvs = document.getElementById('stars');
const ctx = cvs.getContext('2d');
let w = window.innerWidth;
let h = window.innerHeight;
cvs.width = w;
cvs.height = h;
const cx = w / 2;
const cy = h / 2;

let stars = [];
const starCount = 800;

function initStar() {
  return {
    x: Math.random() * w,
    y: Math.random() * h,
    size: Math.random() * 1.5 + 0.5,
    baseSpeed: Math.random() * 0.2 + 0.1,
  };
}
for (let i = 0; i < starCount; i++) stars.push(initStar());

let isWarp = false;
let warpFrame = 0;
const warpDuration = 180;

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = '#fff';
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    if (isWarp) {
      const dx = cx - s.x;
      const dy = cy - s.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 30) {
        stars[i] = initStar();
        continue;
      }
      const speed = 12;
      s.x += dx / dist * speed;
      s.y += dy / dist * speed;
    } else {
      s.x += s.baseSpeed;
      if (s.x > w) s.x = 0;
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  if (isWarp) {
    warpFrame++;
    if (warpFrame >= warpDuration) {
      isWarp = false;
      warpFrame = 0;
    }
  }
  requestAnimationFrame(draw);
}
draw();

function startWarp() {
  isWarp = true;
  warpFrame = 0;
}


function getToday() {
  return new Date().toDateString();
}
function canUse(key) {
  const today = getToday();
  const count = parseInt(localStorage.getItem(key + '_cnt') || 0);
  return count < 2;
}
function useOnce(key) {
  const count = parseInt(localStorage.getItem(key + '_cnt') || 0);
  localStorage.setItem(key + '_cnt', count + 1);
}

// 真随机池
function drawPool(min, max, cnt) {
  let pool = [];
  for (let i = min; i <= max; i++) pool.push(i);
  let res = [];
  for (let i = 0; i < cnt; i++) {
    let idx = Math.floor(Math.random() * pool.length);
    res.push(pool[idx]);
    pool.splice(idx, 1);
  }
  return res.sort((a, b) => a - b);
}

let copyStr = '';

function showBalls(nums, blueIdx) {
  const area = document.getElementById('ballArea');
  area.innerHTML = '';
  nums.forEach((n, i) => {
    const b = document.createElement('div');
    b.className = 'ball roll';
    b.classList.add(blueIdx.includes(i) ? 'blue' : 'red');
    area.appendChild(b);
    setTimeout(() => {
      b.classList.remove('roll');
      b.innerText = n;
    }, 1200);
  });
}

// 绑定按钮
function bind(btnId, key, gen) {
  const btn = document.getElementById(btnId);
  btn.addEventListener('click', function() {
    if (!canUse(key)) {
      alert('今日算力用尽，明天再试');
      return;
    }
    document.getElementById('tip').innerText = '正在连接算力...';
    document.getElementById('resultName').innerText = '';
    document.getElementById('ballArea').innerHTML = '';
    document.getElementById('copy').style.display = 'none';
    btn.disabled = true;
    startWarp();
    setTimeout(() => {
      const [title, all, bluePos, copy] = gen();
      document.getElementById('resultName').innerText = title;
      showBalls(all, bluePos);
      copyStr = copy;
      document.getElementById('copy').style.display = 'inline-block';
      document.getElementById('tip').innerText = '';
      btn.disabled = false;
      useOnce(key);
    }, 3000);
  });
}

// 双色球
bind('btn1', 'ssq', () => {
  const red = drawPool(1, 33, 6);
  const blue = drawPool(1, 16, 1);
  const copy = `双色球 红球 ${red.join(' ')} 蓝球 ${blue[0]}`;
  return ['双色球', [...red, ...blue], [6], copy];
});

// 大乐透
bind('btn2', 'dlt', () => {
  const front = drawPool(1, 35, 5);
  const back = drawPool(1, 12, 2);
  const copy = `大乐透 前区 ${front.join(' ')} 后区 ${back.join(' ')}`;
  return ['大乐透', [...front, ...back], [5,6], copy];
});

// 3D
bind('btn3', '3d', () => {
  const n = [
    Math.floor(Math.random()*10),
    Math.floor(Math.random()*10),
    Math.floor(Math.random()*10)
  ];
  const copy = `福彩3D ${n.join('')}`;
  return ['福彩3D', n, [], copy];
});

// 复制兼容
document.getElementById('copy').addEventListener('click', function() {
  if (!copyStr) return;
  try {
    const textArea = document.createElement('textarea');
    textArea.value = copyStr;
    textArea.style.position = 'fixed';
    textArea.style.left = '-9999px';
    document.body.appendChild(textArea);
    textArea.select();
    document.execCommand('copy');
    document.body.removeChild(textArea);
    alert('复制成功：\n' + copyStr);
  } catch (e) {
    alert('复制失败，请手动选择复制');
  }
});

// ================= 顶部两条滚动文字 =================
const now = new Date();
const month = now.getMonth() + 1;
const day = now.getDate();
const x = (month * month + day * day) % 100;
const hitNum = x + 62;

const msg1 = "由于算力有限，每个彩票每天只能两次";
const msg2 = `本网址上期中奖人数 ${hitNum} 人`;
document.getElementById('marqueeText').innerText = `${msg1} 　 ${msg2}`;

</script>
<script>
    // --- 5+ 通用返回键逻辑 (适用于所有三级页面) ---
    function initBackButtonForSubPage() {
        console.log("【子页面】开始注册返回键监听...");
        
        plus.key.addEventListener('backbutton', function() {
            console.log("【子页面】捕获到返回键事件！");
            
            var self = plus.webview.currentWebview();
            // 这里的 'homePage' 必须与 index.html 中创建主页时的 ID 一致
            var homePage = plus.webview.getWebviewById('homePage');

            if (homePage && !homePage.closed) {
                console.log("【子页面】找到主页，执行返回逻辑...");
                try {
                    // 1. 显示主页 (使用 'none' 动画最快且最稳)
                    homePage.show('none');
                    
                    // 2. 稍微延迟后关闭当前页，确保切换流畅
                    setTimeout(function() {
                        if (!self.closed) {
                            self.close('none');
                            console.log("【子页面】当前页已关闭");
                        }
                    }, 100); 
                } catch (e) {
                    console.error("【子页面】发生错误:", e);
                    self.close(); // 出错时强制关闭
                }
            } else {
                console.warn("【子页面】未找到主页，直接关闭当前页");
                self.close();
            }
        }, false);
        
        console.log("【子页面】返回键监听注册完成");
    }

    // 双重保险：确保 plus 环境就绪
    if (window.plus) {
        initBackButtonForSubPage();
    } else {
        document.addEventListener('plusready', initBackButtonForSubPage, false);
    }
</script>
</body>
</html>
