  const now = new Date();

  const todayStart = new Date(
    now.getFullYear(),
    now.getMonth(),
    now.getDate()
  );

  // 30天后 00:00:00（不含）
  const monthLaterStart = new Date(todayStart.getTime() + 30 * oneDayMs);

// 粒子动画
let pCanvas=document.createElement("canvas");
pCanvas.id="particles";
document.body.appendChild(pCanvas);
let ctx=pCanvas.getContext("2d");
let w,h,partArr=[];
function resizeCanvas(){w=window.innerWidth;h=window.innerHeight;pCanvas.width=w;pCanvas.height=h}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);
class Particle{
constructor(){
this.x=Math.random()*w;
this.y=Math.random()*h;
this.r=Math.random()*2+0.5;
this.speedX=Math.random()*0.4-0.2;
this.speedY=Math.random()*0.4-0.2;
this.color=["#4cc9f0","#7209b7","#f72585"][Math.floor(Math.random()*3)];
}
update(){
this.x+=this.speedX;
this.y+=this.speedY;
if(this.x<0||this.x>w)this.speedX*=-1;
if(this.y<0||this.y>h)this.speedY*=-1;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fillStyle=this.color;
ctx.fill();
}
}
for(let i=0;i<=40;i++)partArr.push(new Particle());
function animatePart(){
ctx.clearRect(0,0,w,h);
for(let i=0;i<partArr.length;i++){
partArr[i].update();
partArr[i].draw();
}
requestAnimationFrame(animatePart);
}
animatePart();
}();
